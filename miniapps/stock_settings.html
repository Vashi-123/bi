<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Controls | Giftery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F8FAFC; color: #0C0C0C; }
        .glass-card { background: white; border: 1px solid #F1F5F9; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .tab-btn.active { background: #0C0C0C; color: white; }
        .tab-btn:not(.active) { color: #94A3B8; }
        .tab-btn:not(.active):hover { color: #0C0C0C; }
    </style>
</head>
<body class="min-h-screen p-8 md:p-12 antialiased">
    
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-br from-[#E8ECEF] via-[#F8FAFC] to-[#D6EAF8] opacity-100"></div>
    </div>

    <main class="relative z-10 max-w-6xl mx-auto space-y-10">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div class="space-y-1">
                <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-black transition-colors mb-4 group">
                    <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Back to Dashboard</span>
                </a>
                <h1 class="text-4xl font-black tracking-tighter">Stock Controls</h1>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-[0.3em]">Manage SKUs, Access, and Notifications</p>
            </div>
            
            <div class="flex flex-col items-end gap-3">
                <a href="daily_report_settings.html" class="flex items-center gap-2 px-4 py-2 bg-white/80 border border-slate-200 hover:border-black/10 hover:bg-white rounded-xl text-[10px] font-black uppercase tracking-widest transition-all shadow-sm">
                    <i data-lucide="file-text" class="w-3 h-3"></i>
                    Switch to Report Settings
                </a>
                <div class="bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 flex gap-1">
                    <button onclick="switchTab('skus')" id="tab-skus" class="tab-btn active flex items-center gap-2 px-6 py-2.5 rounded-xl text-xs font-bold transition-all">
                        <i data-lucide="package" class="w-4 h-4"></i> SKUs
                    </button>
                    <button onclick="switchTab('access')" id="tab-access" class="tab-btn flex items-center gap-2 px-6 py-2.5 rounded-xl text-xs font-bold transition-all">
                        <i data-lucide="shield-check" class="w-4 h-4"></i> Access
                    </button>
                    <button onclick="switchTab('notify')" id="tab-notify" class="tab-btn flex items-center gap-2 px-6 py-2.5 rounded-xl text-xs font-bold transition-all">
                        <i data-lucide="bell-ring" class="w-4 h-4"></i> Notify
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 glass-card rounded-3xl p-8 h-fit">
                <h3 id="form-title" class="text-xl font-bold mb-6">Add New SKU</h3>
                <div class="space-y-6">
                    <div id="sku-inputs" class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Item Name</label>
                            <input type="text" id="input-name" placeholder="e.g. PUBG Mobile 60 UC" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-black/5">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Internal ID / SKU</label>
                            <input type="text" id="input-id" placeholder="e.g. 1042" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-black/5">
                        </div>
                    </div>
                    <button onclick="handleSubmit()" class="w-full bg-black text-white rounded-xl py-4 text-sm font-bold shadow-lg hover:bg-slate-900 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i>
                        <span id="btn-text">Add to Monitor</span>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="glass-card rounded-3xl overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center bg-white/50">
                        <p id="list-title" class="text-sm font-bold uppercase tracking-widest text-slate-400">Currently Monitored</p>
                        <span id="item-count" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-[10px] font-black">0 ITEMS</span>
                    </div>
                    <div id="list-container" class="divide-y divide-slate-50 max-h-[600px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "http://192.168.55.112:8081";
        let currentTab = 'skus';

        async function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            const titles = {
                skus: { form: 'Add New SKU', list: 'Currently Monitored', btn: 'Add to Monitor' },
                access: { form: 'Authorize User', list: 'Authorized Admins', btn: 'Grant Access' },
                notify: { form: 'Add Recipient', list: 'Notification List', btn: 'Save Recipient' }
            };
            document.getElementById('form-title').innerText = titles[tab].form;
            document.getElementById('list-title').innerText = titles[tab].list;
            document.getElementById('btn-text').innerText = titles[tab].btn;
            const inputs = document.getElementById('sku-inputs');
            if (tab === 'skus') {
                inputs.innerHTML = `
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Item Name</label>
                        <input type="text" id="input-name" placeholder="e.g. PUBG Mobile" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">SKU ID</label>
                        <input type="text" id="input-id" placeholder="e.g. 1042" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm font-bold">
                    </div>`;
            } else {
                inputs.innerHTML = `
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Full Name</label>
                        <input type="text" id="input-name" placeholder="e.g. Usman Ganaev" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Telegram ID</label>
                        <input type="text" id="input-id" placeholder="e.g. 12345678" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm font-bold">
                    </div>`;
            }
            loadData();
        }

        async function loadData() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="p-12 text-center text-slate-300 font-bold animate-pulse">Loading...</div>';
            try {
                const endpoint = currentTab === 'skus' ? 'skus' : (currentTab === 'access' ? 'admins' : 'recipients');
                const resp = await fetch(`${API_BASE}/api/settings/${endpoint}`, { headers: { 'x-telegram-init-data': 'admin_mock' } });
                const items = await resp.json();
                document.getElementById('item-count').innerText = `${items.length} ${currentTab.toUpperCase()}`;
                if (items.length === 0) {
                    container.innerHTML = '<div class="p-20 text-center text-slate-300 font-bold">No entries found</div>';
                    return;
                }
                container.innerHTML = items.map(item => `
                    <div class="flex items-center justify-between p-6 bg-white hover:bg-slate-50 transition-colors group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 font-bold text-xs">
                                ${item.id ? item.id.toString().slice(-2) : '??'}
                            </div>
                            <div>
                                <p class="font-bold text-sm">${item.name}</p>
                                <p class="text-[10px] font-mono text-slate-400 uppercase">${item.id || item.telegram_id}</p>
                            </div>
                        </div>
                        <button onclick="deleteItem('${item.id || item.telegram_id}')" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all opacity-0 group-hover:opacity-100">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { container.innerHTML = `<div class="p-12 text-center text-red-400 font-bold">Error: ${e.message}</div>`; }
        }

        async function handleSubmit() {
            const id = document.getElementById('input-id').value;
            const name = document.getElementById('input-name').value;
            if (!id || !name) return alert('Fill all fields');
            const endpoint = currentTab === 'skus' ? 'skus' : (currentTab === 'access' ? 'admins' : 'recipients');
            const payload = currentTab === 'skus' ? { sku_id: id, name } : { telegram_id: parseInt(id), name };
            try {
                const resp = await fetch(`${API_BASE}/api/settings/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-telegram-init-data': 'admin_mock' },
                    body: JSON.stringify(payload)
                });
                if (resp.ok) {
                    document.getElementById('input-id').value = '';
                    document.getElementById('input-name').value = '';
                    loadData();
                }
            } catch (e) { alert(e.message); }
        }

        async function deleteItem(id) {
            if (!confirm('Confirm delete?')) return;
            const endpoint = currentTab === 'skus' ? 'skus' : (currentTab === 'access' ? 'admins' : 'recipients');
            try {
                await fetch(`${API_BASE}/api/settings/${endpoint}/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-telegram-init-data': 'admin_mock' }
                });
                loadData();
            } catch (e) { alert(e.message); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadData();
        });
    </script>
</body>
</html>
